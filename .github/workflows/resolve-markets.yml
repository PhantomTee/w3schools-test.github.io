name: Resolve Expired Markets

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual trigger from Actions tab

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger market resolution
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/resolve" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Cron endpoint returned non-2xx status: $HTTP_STATUS"
            exit 1
          fi
