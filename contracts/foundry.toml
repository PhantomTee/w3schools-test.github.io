[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
optimizer = true
optimizer_runs = 200
solc_version = "0.8.24"
via_ir = false

[profile.default.fuzz]
runs = 1000

[profile.ci]
fuzz = { runs = 5000 }

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
arc_testnet = { key = "${ARC_EXPLORER_API_KEY}", url = "${ARC_EXPLORER_URL}" }
